name: Feature request
description: Suggest an improvement to the wrapper contract, diagnostics, or demo surfaces.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is hard or unclear today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Link docs, examples, or Firecrawl behavior that motivated the request.
